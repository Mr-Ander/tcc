<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo - Conecta Botânica</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/painel-admin.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Painel Administrativo</h1>
      <button onclick="sairAdmin()" class="btn-sair">SAIR</button>
    </div>

    <div class="menu">
      <div class="menu-item" onclick="irPendentes()" role="button" tabindex="0">
        <h2>Plantas Pendentes</h2>
        <p id="totalPendentes">0 plantas aguardando aprovação</p>
      </div>

      <div class="menu-item" onclick="irGerenciarAdmins()" role="button" tabindex="0">
        <h2>Gerenciar Administradores</h2>
        <p>Adicionar ou remover administradores</p>
      </div>

      <div class="menu-item" onclick="irIndex()" role="button" tabindex="0">
        <h2>Ver Plantas Aprovadas</h2>
        <p>Visualizar catálogo de plantas</p>
      </div>
    </div>
  </div>

  <script src="js/admin-base.js"></script>
  <script src="js/config.js"></script>
  <script src="js/painel-admin.js"></script>
</body>
</html>
